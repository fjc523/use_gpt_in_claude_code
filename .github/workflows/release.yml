name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate_build:
    name: Validate and build release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      expected_tag: ${{ steps.release_meta.outputs.expected_tag }}
      dist_tag: ${{ steps.release_meta.outputs.dist_tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      publish_package_name: ${{ steps.release_meta.outputs.publish_package_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Fetch main branch
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Validate tag against package version
        id: release_meta
        run: node scripts/check-release.mjs --tag "$GITHUB_REF_NAME" --check-main --output

      - name: Run P0 regression suite
        run: npm run test:p0:check

      - name: Build publish package
        run: npm run build:claudex

      - name: Validate generated publish package
        run: node scripts/check-release.mjs --package-json .build/claudex/package.json --check-registry

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudex-package
          path: .build/claudex
          if-no-files-found: error

  publish_npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: validate_build
    permissions:
      contents: read
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: claudex-package
          path: .build/claudex

      - name: Publish package to npm
        working-directory: .build/claudex
        env:
          AUTHORIZED: '1'
          CI: 'true'
          GITHUB_ACTIONS: 'true'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag "${{ needs.validate_build.outputs.dist_tag }}"

  create_github_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate_build
      - publish_npm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.validate_build.outputs.expected_tag }}
          RELEASE_TITLE: ${{ needs.validate_build.outputs.expected_tag }}
          IS_PRERELEASE: ${{ needs.validate_build.outputs.is_prerelease }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            gh release create "$TAG_NAME" --title "$RELEASE_TITLE" --generate-notes --verify-tag --prerelease
          else
            gh release create "$TAG_NAME" --title "$RELEASE_TITLE" --generate-notes --verify-tag
          fi
